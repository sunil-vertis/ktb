<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Email Form Submission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500&display=swap" rel="stylesheet" />
  <style type="text/css">
    body { margin: 0 !important; padding: 0 !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; display: block; }
    a { text-decoration: underline; }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#ffffff;">
  <div style="display:none; max-height:0; overflow:hidden; mso-hide:all; font-size:1px; line-height:1px; color:#ffffff; opacity:0;">
    Your registration summary — Krungthai Bank
  </div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:0;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px; background-color:#ffffff;">
          <tr>
            <td style="background-color:#00a8e9; height:72px; padding:0 20px; vertical-align:middle;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="left" valign="middle" style="vertical-align:middle;">
                    <img
                      src="https://images3.cmp.optimizely.com/Zz1hMDBmZWYwMDRkMGMxMWYxOGZiYjNlNDZkYWRiNjM4ZQ=="
                      width="144"
                      height="60"
                      alt="Krungthai Bank"
                      style="width:144px; height:60px; display:block; border:0;"
                    />
                  </td>
                  <td width="12" style="width:12px; font-size:0; line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="height:40px; line-height:40px; font-size:0;">&nbsp;</td>
          </tr>
          <tr>
            <td style="padding:0 44px; font-family:'Prompt', Arial, Helvetica, sans-serif; font-size:16px; font-weight:400; line-height:1.6; color:#002533;">
              {EmailBody}
            </td>
          </tr>

          <tr>
            <td style="height:40px; line-height:40px; font-size:0;">&nbsp;</td>
          </tr>
          <tr>
            <td align="center" style="padding:0 20px;">
              <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="width:560px; max-width:560px; background-color:#f7f7f7;">
                {SubmissionDetails}
              </table>
            </td>
          </tr>

          <tr>
            <td style="height:40px; line-height:40px; font-size:0;">&nbsp;</td>
          </tr>
          <tr>
            <td style="background-color:#002533; padding:48px 0 32px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:0 20px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="font-family:'Prompt', Arial, Helvetica, sans-serif; font-size:16px; font-weight:400; line-height:1.6; color:rgba(255,255,255,0.6); text-align:center;">
                          For enquiries, visit
                          <a href="https://www.krungthai.com" target="_blank" rel="noopener noreferrer" style="color:#00a8e9; text-decoration:underline;">Krungthai.com</a>
                          or
                          <a href="#" style="color:#00a8e9; text-decoration:underline;">contact us</a>
                        </td>
                      </tr>
                    </table>
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="height:24px; line-height:24px; font-size:0;">&nbsp;</td>
                      </tr>
                    </table>
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="border-top:1px solid rgba(255,255,255,0.4); padding-top:20px; mso-border-top-alt:1px solid rgba(255,255,255,0.4);">
                          <p style="margin:0; font-family:'Prompt', Arial, Helvetica, sans-serif; font-size:16px; font-weight:400; line-height:1.6; color:rgba(255,255,255,0.6); text-align:center;">
                            © 2026 Krungthai Bank PCL | SWIFT CODE: krththbk
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
