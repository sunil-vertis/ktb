query GetEmailTemplates($formName: String) {
  CustomerEmailTemplateBlock(
    where: {
      _metadata: {
        displayName: {
          eq: $formName
        }
      }
    }
  ) {
    items {
      _metadata {
        key
        displayName
        locale
      }
      Subject
      FromEmail
      EmailBody {
        html
      }
    }
  }

  StaffEmailTemplateBlock(
    where: {
      _metadata: {
        displayName: {
          eq: $formName
        }
      }
    }
  ) {
    items {
      _metadata {
        key
        displayName
      }

      Subject
      FromEmail
      ToEmail
      CcEmail
      EmailBody {
        html
      }
    }
  }
}