query getPreviewPageByURL(
  $locales: [Locales]
  $slug: String
  $version: String
) {
  CMSPage(
    locale: $locales
    where: {
      _metadata: { version: { eq: $version } }
      _and: { _metadata: { url: { default: { eq: $slug } } } }
    }
  ) {
    item {
      title
      _metadata {
        displayName
        url {
          default
          hierarchical
          internal
          base
        }
      }
      blocks {
        ...ItemsInContentArea
      }
    }
  }
}
