fragment CardListingBlockFragment on CardListingBlock {
  title
  subtitle
  allChipLabel
  pageSize
  backgroundColor
  paginationAriaLabel
  showPaginationSummary
  emptyLabel
  loadMoreLabel
  items {
    __typename
    ... on CardListingItemBlock {
      _metadata {
        key
      }
      title
      # Aliased: merged with PortfolioGridBlock.items under _IContent, where
      # PortfolioItemBlock uses String description/link — GraphQL requires
      # distinct response names for incompatible types.
      cardListingDescription: description {
        html
      }
      image {
        key
        url {
          default
          base
          hierarchical
          internal
        }
        item {
          __typename
          ... on ImageMedia {
            _assetMetadata {
              url
            }
          }
        }
      }
      imageFit
      imageFlush
      badgeLabel
      badgeVariant
      chipId
      linkLabel
      cardListingLink: link {
        text
        title
        target
        url {
          default
          base
          hierarchical
          internal
        }
      }
    }
  }
  chipFilters {
    __typename
    ... on CardListingChipFilterBlock {
      id
      label
    }
  }
}

fragment applicationCardBlock on ApplicationCardBlock {
  __typename
  _metadata {
    key
    types
  }
  Heading
  Description
  ApplicationLink {
    url {
      default
    }
    title
    target
  }
  QRImage {
    url {
      default
    }
  }
}

fragment ItemsInContentArea on _IContent {
  __typename
  _metadata {
    key
  }
  ...HeroBlockFragment
  ...ContactBlockFragment
  ...LogosBlockFragment
  ...PortfolioGridBlockFragment
  ...ServicesBlockFragment
  ...TestimonialsBlockFragment
  ...ProfileBlockFragment
  ...AvailabilityBlockFragment
  ...StoryBlockFragment
  ...BannerStripBlockFragment
  ...KeyFeatureBlockFragment
  ...RecommendedCarouselBlockFragment
  ...StepsSectionBlockFragment
  ...PromoHighlightsBlockFragment
  ...CtaSectionBlockFragment
  ...QuickLinkBlockFragment
  ...HeroBannerBlockFragment
  ...CampaignBannerBlockFragment
  ...CardListingBlockFragment
  ...EligibilitySummaryBlockFragment
  ...ProductHighlightsBlockFragment
  ...PersonalLoanCalculatorBlockFragment
  ...OptionBlockFragment
  ...LoanInterestRatesSectionBlockFragment
  ...LoanLimitGrantedSectionBlockFragment
  ...LoanCalculationExamplesSectionBlockFragment
  ...LoanTermMediaGallerySectionBlockFragment
  ...LoanInterestGroupBlockFragment
  ...ProductDetailsConditionsBlockFragment
  ...DownloadSectionBlockFragment
  ...ProductFaqBlockFragment
  ...RequestInformationBlockFragment
  ...StickySideBarBlockFragment
  ...ProductDetailsAnchorTabsBlockFragment
  ...ProductDetailsPageBlockFragment
  ...applicationCardBlock

  ... on OptiFormsTextboxElement {
    _metadata {
      key
      types
    }
    Label
    Tooltip
    Placeholder
    AutoComplete
    PredefinedValue
    Validators
  }

  ... on OptiFormsTextareaElement {
    _metadata {
      key
      types
    }
    Label
    Tooltip
    Placeholder
    AutoComplete
    PredefinedValue
    Validators
  }

  ... on OptiFormsNumberElement {
    _metadata {
      key
      types
    }
    Label
    Tooltip
    Placeholder
    PredefinedValue
    Validators
  }

  ... on OptiFormsSelectionElement {
    _metadata {
      key
      types
    }
    Label
    Tooltip
    AutoComplete
    Placeholder
    Validators
    Options
  }

  ... on OptiFormsChoiceElement {
    _metadata {
      key
      types
    }
    Label
    Tooltip
    Options
    AllowMultiSelect
    Validators
  }

  ... on OptiFormsSubmitElement {
    _metadata {
      key
      types
    }
    Label
    Tooltip
  }

  ... on ParagraphElement {
    _metadata {
      key
      types
    }
    Text {
      html
    }
  }
}
