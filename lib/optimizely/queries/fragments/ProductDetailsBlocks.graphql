fragment ProductDetailsAnchorTabsBlockFragment on ProductDetailsAnchorTabsBlock {
  SectionId
  Label
}

fragment ProductDetailsNestedColumnBlockFragment on _IContent {
  __typename
  ... on EligibilitySummaryBlock {
    ...EligibilitySummaryBlockFragment
  }
  ... on ProductHighlightsBlock {
    ...ProductHighlightsBlockFragment
  }
  ... on PersonalLoanCalculatorBlock {
    ...PersonalLoanCalculatorBlockFragment
  }
  ... on LoanInterestRatesSectionBlock {
    ...LoanInterestRatesSectionBlockFragment
  }
  ... on LoanLimitGrantedSectionBlock {
    ...LoanLimitGrantedSectionBlockFragment
  }
  ... on LoanCalculationExamplesSectionBlock {
    ...LoanCalculationExamplesSectionBlockFragment
  }
  ... on LoanTermMediaGallerySectionBlock {
    ...LoanTermMediaGallerySectionBlockFragment
  }
  ... on LoanInterestGroupBlock {
    ...LoanInterestGroupBlockFragment
  }
  ... on ProductDetailsConditionsBlock {
    ...ProductDetailsConditionsBlockFragment
  }
  ... on DownloadSectionBlock {
    ...DownloadSectionBlockFragment
  }
  ... on ProductFaqBlock {
    ...ProductFaqBlockFragment
  }
  ... on RequestInformationBlock {
    ...RequestInformationBlockFragment
  }
  ... on StickySideBarBlock {
    ...StickySideBarBlockFragment
  }
}

fragment ProductDetailsPageBlockFragment on ProductDetailsPageBlock {
  AnchorTabItems {
    __typename
    ... on ProductDetailsAnchorTabsBlock {
      ...ProductDetailsAnchorTabsBlockFragment
    }
  }
  LeftContent {
    ...ProductDetailsNestedColumnBlockFragment
  }
  RightContent {
    ...ProductDetailsNestedColumnBlockFragment
  }
}
